<!DOCTYPE html>
<html>
<title>Resume</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://longmengua.github.io/css/main.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/hypertext.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/navigation.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/rwd.css">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/vue"></script>
<style>

</style>
<body>
<div id="index" class="w3-content" style="max-width:100%;">
    <v-navigation v-bind:selected="selected" v-on:out="selected = $event" v-on:page="navBarSwitcher = $event"></v-navigation>
    <v-home v-bind:selected="selected" v-show="navBarSwitcher == 'home'"></v-home>
    <v-blog v-bind:selected="selected" v-show="navBarSwitcher == 'blog'"></v-blog>
    <div></div>
</div>
<script>
Vue.component('v-home', {
    props: ['selected'],
    data: function () {
        return {
            labelOption1:0, //0: basic info, 1: tech skills info.
            labelOption2:0, //0: work experience, 1: education.
        }
    },
    template: `
    <div id="home" class="w3-row-padding main">
        <div class="w3-third left-side">
            <div style="text-align:center;">
                <v-label-left v-bind:selected="selected" v-on:out="labelOption1 = $event"></v-label-left>
            </div>
            <div class="w3-white w3-text-grey w3-card-4">
                <div v-show="labelOption1 == 0" class="w3-container">
                    <v-avatar v-bind:selected="selected"></v-avatar>
                    <v-social v-bind:selected="selected" style="background-color:white;color:#009688!important;"></v-social>
                    <v-profile v-bind:selected="selected"></v-profile>
                    <hr/>
                    <v-language v-bind:selected="selected"></v-language>
                </div>
                <div v-show="labelOption1 == 1" class="w3-container">
                    <v-skill v-bind:selected="selected"></v-skill>
                </div>
            </div>
            <br/>
        </div>
        <div class="w3-twothird right-side">
            <div style="text-align:center;">
                <v-label-right v-bind:selected="selected" v-on:out="labelOption2 = $event"></v-label-right>
            </div>
            <v-experience v-show="labelOption2 == 0"  v-bind:selected="selected"></v-experience>
            <v-education v-show="labelOption2 == 1"  v-bind:selected="selected"></v-education>
        </div>
    </div>
    `
})
</script>
<!------------------------------------------------------------------------------------------->
<script type="application/javascript" src="https://longmengua.github.io/component/label-left.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/label-right.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/avatar.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/education.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/language.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/navigation.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/profile.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/skill.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/social.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/experience.js"></script>

<!--<script type="application/javascript" src="https://longmengua.github.io/page/home.js"></script>-->
<script type="application/javascript" src="https://longmengua.github.io/page/blog.js"></script>

<script type="application/javascript" src="https://longmengua.github.io/main.js"></script>
</body>
</html>
