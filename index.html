<!DOCTYPE html>
<html xmlns:v-bind="http://www.w3.org/1999/xhtml">
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://longmengua.github.io/css/main.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/hypertext.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/navigation.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/rwd.css">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/vue"></script>
<style>
/* For dropdown list */

</style>
<body>

<!-- Page Container -->
<div id="index" class="w3-content" style="max-width:100%;">
    <v-navigation v-bind:select="selected" v-on:selectOut="selected = $event"></v-navigation>
    <div>
        <!-- The Grid -->
        <div class="w3-row-padding main">
            <!-- Left Column -->
            <div class="w3-third">
                <div class="w3-white w3-text-grey w3-card-4">
                    <div class="w3-display-container">
                        <v-avatar v-bind:selected="selected"></v-avatar>
                    </div>
                    <div class="w3-display-container">
                        <v-profile v-bind:selected="selected"></v-profile>
                    </div>
                    <div class="w3-container">
                        <v-language v-bind:selected="selected"></v-language>
                        <br/>
                        <v-skill v-bind:selected="selected"></v-skill>
                    </div>
                </div>
            </div>
            <!-- End Left Column -->
            <!-- Right Column -->
            <div class="w3-twothird">
                <v-work-experience v-bind:selected="selected"></v-work-experience>
                <v-education v-bind:selected="selected"></v-education>
            </div>
            <!-- End Right Column -->
        </div>
    </div>
</div>
<!-- End Page Container -->
<!------------------------------------------------------------------------------------------->
<!--using vue.js framework is for implementing i18n, the reason I have chosen it is because of the light-weight size.-->
<script>
Vue.component('v-navigation', {
    props: ['select'],
    data: function () {
        return {
            navBarSwitcher: 'home',
            options: [
                { text: 'English', value: 'en' },
                { text: '中文(台灣)', value: 'zh_tw' },
            ],
            i18ns: {
                en: {

                },
                zh_tw: {

                }
            },
            href: [
                "https://www.facebook.com/longmengua",
                "https://www.instagram.com/waltor1991/?r=nametag&fbclid=IwAR3DN39lbUdvQ5-aTia9AcAiJMHUrARZv3qewDOvNpCjiWRGRAgSOBPfo8M",
                "https://www.linkedin.com/in/鴻文-黃-17b61b17b",
                "https://line.me/ti/p/9UMBNQ5K5p",
            ],
        }
    },
    template: `
    <ul class="navBar">
        <li>
            <input id="radio1" v-model="navBarSwitcher" type="radio" value="home" style="display:none;">
            <label for="radio1">Home</label>
        </li>
        <li>
            <input id="radio2" v-model="navBarSwitcher" type="radio" value="blog" style="display:none;">
            <label for="radio2">Blog</label>
        </li>
        <li>
            <div class="ln-selector">
                <select v-bind:value="select" v-on:input="$emit('input', $event.target.value)" style="border: none; outline: none;">
                    <option v-for="option in options" v-bind:value="option.value">{{ option.text }}</option>
                </select>
            </div>
        </li>
    </ul>
    `
})
</script>
<script type="application/javascript" src="https://longmengua.github.io/component/avatar.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/education.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/language.js"></script>

</body>
</html>
