<!DOCTYPE html>
<html xmlns:v-bind="http://www.w3.org/1999/xhtml">
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://longmengua.github.io/css/main.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/hypertext.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/navigation.css">
<link rel="stylesheet" href="https://longmengua.github.io/css/rwd.css">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/vue"></script>
<style>
/* For dropdown list */

</style>
<body>

<!-- Page Container -->
<div id="index" class="w3-content" style="max-width:100%;">
    <v-navigation v-bind:select="selected" v-on:input="selected = $event"></v-navigation>
    <div>
        <!-- The Grid -->
        <div class="w3-row-padding main">
            <!-- Left Column -->
            <div class="w3-third">
                <div class="w3-white w3-text-grey w3-card-4">
                    <div class="w3-display-container">
                        <v-avatar v-bind:selected="selected"></v-avatar>
                    </div>
                    <div class="w3-display-container">
                        <v-profile v-bind:selected="selected"></v-profile>
                    </div>
                    <div class="w3-container">
                        <v-language v-bind:selected="selected"></v-language>
                        <br/>
                        <v-skill v-bind:selected="selected"></v-skill>
                    </div>
                </div>
            </div>
            <!-- End Left Column -->
            <!-- Right Column -->
            <div class="w3-twothird">
                <!--Work Experience-->
                <div class="w3-container w3-card w3-white w3-margin-bottom">
                    <h2 class="w3-text-grey w3-padding-16"><i
                            class="fa fa-suitcase fa-fw w3-margin-right w3-xxlarge w3-text-teal"></i>{{i18ns[selected]['workExperienceTitle']}}
                    </h2>
                    <div class="w3-container" v-for="(workExperience, index) in i18ns[selected]['workExperience']">
                        <h5 class="w3-opacity"><b>{{workExperience['title']}}</b>&nbsp;<a
                                v-bind:href="index > workExperienceLinks.length ? null : workExperienceLinks[index]"><i
                                class="scalable fa fa-external-link fa-fw w3-margin-right"></i></a></h5>
                        <h6 class="w3-text-teal"><i class="fa fa-calendar fa-fw w3-margin-right"></i>{{workExperience['date']}}
                        </h6>
                        <p>{{workExperience['content']}}</p>
                        <br/>
                    </div>
                </div>
                <!--Education-->
                <div class="w3-container w3-card w3-white">
                    <h2 class="w3-text-grey w3-padding-16"><i
                            class="fa fa-certificate fa-fw w3-margin-right w3-xxlarge w3-text-teal"></i>{{i18ns[selected]['educationTitle']}}
                    </h2>
                    <div class="w3-container" v-for="(education, index) in i18ns[selected]['education']">
                        <h5 class="w3-opacity"><b>{{education['title']}}</b>&nbsp;<a
                                v-bind:href="index > educationLinks.length ? null : educationLinks[index]"><i
                                class="scalable fa fa-external-link fa-fw w3-margin-right"></i></a></h5>
                        <h6 class="w3-text-teal"><i class="fa fa-calendar fa-fw w3-margin-right"></i>{{education['date']}}
                        </h6>
                        <p>{{education['content']}}</p>
                        <br/>
                    </div>
                </div>
            </div>
            <!-- End Right Column -->
        </div>
    </div>
</div>
<!-- End Page Container -->
<!------------------------------------------------------------------------------------------->
<!--using vue.js framework is for implementing i18n, the reason I have chosen it is because of the light-weight size.-->
<script>
Vue.component('v-avatar', {
    props: ['selected'],
    data: function () {
        return {
            i18ns: {
                en: {
                    name: 'Waltor Huang',
                },
                zh_tw: {
                    name: '黃鴻文',
                }
            },
        }
    },
    template: `
    <!--Profile image-->
    <img style="width: 100%;border-radius: 50%;" alt="Avatar" src="https://longmengua.github.io/assets/Profile.jpg">
    <div style="text-align: center;">
        <h2>{{i18ns[selected]['name']}}</h2>
    </div>
    `
})
</script>
<!--<script type="application/javascript" src="https://longmengua.github.io/component/avatar.js"></script>-->
<script type="application/javascript" src="https://longmengua.github.io/component/education.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/language.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/navigation.js"></script>
<!--<script type="application/javascript" src="https://longmengua.github.io/component/prpfile.js"></script>-->
<script type="application/javascript" src="https://longmengua.github.io/component/skill.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/social-media.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/component/work-experience.js"></script>
<script type="application/javascript" src="https://longmengua.github.io/main.js"></script>
</body>
</html>
